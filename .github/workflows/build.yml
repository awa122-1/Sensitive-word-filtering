name: Build and Package Mod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允许你在 GitHub 页面上点击按钮手动触发构建

jobs:
  build:
    runs-on: windows-latest # 编译 Among Us 模组通常推荐在 Windows 环境下进行

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x' # 或者是你项目实际使用的 .NET 版本（如 6.0 或 7.0）

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Mod (Release)
      run: dotnet build --configuration Release --no-restore

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AmongUsFilterMod-Plugin
        path: bin/Release/**/AmongUsFilterMod.dll # 自动抓取编译生成的 dll 文件
